# pip-audit / uv pip audit CVE allowlist
#
# Normative spec: specs/25-cicd-full.md §3.2 (Artefacts → CVE allowlist) and
# §10.3 (Configuration & defaults → CVE allowlist file).
#
# Policy (do not delete this header):
#   - This file is the SINGLE source of truth for accepted, time-boxed
#     dependency CVE exceptions. `make security` reads entries via
#     `scripts/pip_audit_ignore_args.py` and passes `--ignore-vuln` per row.
#   - Every entry MUST include:
#       * the CVE id (`vuln_id`),
#       * a tracking-ticket reference (issue link or id),
#       * a `review_by` date (YYYY-MM-DD) — entries past this date are
#         treated as expired and MUST be re-evaluated, not silently kept.
#   - Adding an entry is a security-review decision, not a build-fix shortcut.
#
# Example shape for additional rows:
#
#   [[ignore]]
#   vuln_id    = "CVE-2026-00000"
#   package    = "example-pkg"
#   reason     = "Vendor patch pending; mitigated by X in our deployment."
#   ticket     = "https://github.com/<org>/<repo>/issues/123"
#   review_by  = "2026-07-01"

