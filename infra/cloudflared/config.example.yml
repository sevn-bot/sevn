# Cloudflare Tunnel — example config for sevn.bot gateway
# Copy to ~/.cloudflared/config.yml (or /etc/cloudflared/config.yml for systemd).
# Store tunnel credentials and token via secrets backend — never commit real values.
#
# Normative playbook: plan/architecture/09-infrastructure.md §9.1

tunnel: <TUNNEL_UUID>
credentials-file: /path/to/<TUNNEL_UUID>.json

ingress:
  # Gateway — Telegram webhooks, external webhooks (doc 14), Web UI API
  - hostname: bot.example.com
    service: http://127.0.0.1:3001
    originRequest:
      noTLSVerify: false
  # Catch-all (required by cloudflared)
  - service: http_status:404

# Optional: metrics for local debugging
# metrics: 127.0.0.1:2000
