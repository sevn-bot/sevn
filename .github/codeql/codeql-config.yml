name: "sevn CodeQL config"

# RFC 4880 OpenPGP SEIPD v1 requires AES-ECB keystream steps and SHA-1 MDC in
# blocks.py; calendar attendee tokens use SHA-1 per Proton/iCal conventions.
paths-ignore:
  - src/proton_cli/service/drive/blocks.py
  # setup.py emits OAuth file paths only; operators read URLs/tokens from .sevn/ files.
  - src/sevn/data/bundled_skills/core/google-workspace/scripts/setup.py
