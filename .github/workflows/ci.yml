# Phase 1 of specs/25-cicd-full.md — the PR verify gate.
#
# The full `make ci` step set is split across parallel jobs so wall-clock is
# the slowest job, not the sum of every tier on one runner:
#
#   - toolchain    → `make lockcheck` when the tree has no src/sevn (I1-style PRs)
#   - test         → `make test`, sharded 4× with pytest-split (matrix)
#   - static       → `make ci-static` (lockcheck, lint, typecheck, pyright,
#                    doctest, build, doctor-solutions)
#   - drift-gates  → `make ci-infra ci-docs ci-skills ci-parity`
#   - security     → `make security` (bandit + pip-audit / OSV.dev)
#
# Together these equal the full `make ci`. The `security` tier (bandit +
# pip-audit) now runs here on PRs too; it ALSO runs daily in
# ci-supplementary.yml (to catch newly-disclosed CVEs on already-merged code)
# and post-merge via `make ci` in ci-cd.yml. Container image builds +
# compose/sandbox integration live in docker.yml (path-filtered).
#
# Gated branches: main / develop / test-pre / pre-0.0.1. Fork PRs run without secrets by
# GitHub default — the gate must stay green on mocks/offline fixtures only.
#
# Branch protection: require "Verify (static + build)", "Verify (drift gates)",
# "Verify (security audit)", and the four "Verify (tests …)" shard checks.
#
# Tier ownership: `ci-static` + sharded `test` + `ci-infra ci-docs ci-skills
# ci-parity` + `security` together equal the full `make ci`. The `security`
# tier also runs daily (see ci-supplementary.yml) to catch newly-disclosed
# CVEs on already-merged code. Keep these jobs in lockstep with the Makefile
# targets.
#
# hashFiles() in job-level `if` is evaluated before checkout and is always empty;
# path gates belong on steps after actions/checkout.
name: CI

on:
  pull_request:
    branches: [main, develop, test-pre, pre-0.0.1]
  push:
    branches: [main, develop, test-pre, pre-0.0.1]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  toolchain:
    name: Verify (toolchain)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: ./.github/actions/bootstrap

      - name: Lockfile check (no src/sevn)
        if: hashFiles('src/sevn/**') == ''
        run: make lockcheck

  test:
    name: Verify (tests ${{ matrix.group }}/4)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        group: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: ./.github/actions/bootstrap

      # pytest-split partitions the suite into 4 balanced shards; each shard
      # still fans out across xdist workers on its runner.
      - name: Unit tests (shard ${{ matrix.group }} of 4)
        if: hashFiles('src/sevn/**') != ''
        env:
          SEVN_TEST_SPLITS: "4"
          SEVN_TEST_GROUP: ${{ matrix.group }}
        run: |
          cp infra/sevn_config_long_description.json src/sevn/data/sevn_config_long_description.json
          make test

  static:
    name: Verify (static + build)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: ./.github/actions/bootstrap

      # lockcheck, lint, typecheck, pyright, doctest, build, doctor-solutions.
      # Pyright lives here (no separate duplicate job).
      - name: Static, doctest, build tier
        if: hashFiles('src/sevn/**') != ''
        run: make ci-static

  drift-gates:
    name: Verify (drift gates)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: ./.github/actions/bootstrap

      - name: Infra + docs + skills + parity tiers
        if: hashFiles('about-sevn.bot/**') != ''
        run: make ci-infra ci-docs ci-skills ci-parity

  security:
    name: Verify (security audit)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: ./.github/actions/bootstrap

      - name: bandit + pip-audit (OSV.dev)
        if: hashFiles('src/sevn/**') != ''
        run: make security
