# PullFrog PR review — DISABLED.
# To re-enable:
#   1. Set PULLFROG_ENABLED to "true" below
#   2. Uncomment the pull_request trigger
#   3. Restore the jobs.review.if condition (see comment on the job)
#
# When enabled, PullFrog runs alongside CodeRabbit. The enforce step fails the
# job if unresolved PullFrog threads remain. If PullFrog cannot run (e.g. Claude
# session limit), the job passes.
name: PullFrog

on:
  workflow_dispatch:
  # Disabled — uncomment to re-enable PR reviews:
  # pull_request:
  #   branches: [main, develop, test-pre, pre-0.0.1]
  #   types: [opened, synchronize, reopened, ready_for_review]

# Master switch. Set to "true" and restore the pull_request trigger to re-enable.
env:
  PULLFROG_ENABLED: "false"

permissions:
  contents: read
  # PullFrog uses OIDC to mint short-lived GitHub App installation tokens.
  id-token: write
  issues: write
  pull-requests: write
  statuses: write

concurrency:
  group: pullfrog-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  review:
    name: PullFrog review
    # DISABLED. Original condition when re-enabling:
    #   env.PULLFROG_ENABLED == 'true' && (github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false)
    if: false
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      HAS_CLAUDE_CODE: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN != '' }}
      HAS_CODEX_AUTH: ${{ secrets.CODEX_AUTH_JSON != '' }}

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: PullFrog PR review (Claude subscription)
        if: env.HAS_CLAUDE_CODE == 'true'
        id: pullfrog_claude
        continue-on-error: true
        uses: pullfrog/pullfrog@a809795406487e13f894c681ea09b4f96015284d # v0
        with:
          model: anthropic/claude-sonnet
          push: disabled
          shell: disabled
          status_checks: enabled
          prompt: |
            Review this pull request as an additional reviewer alongside CodeRabbit.
            Focus on correctness, security, regressions, missing tests, and maintainability.
            Leave concise, actionable comments only for issues that should be addressed before merge.
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

      - name: PullFrog PR review (Codex/OpenAI subscription)
        if: env.HAS_CLAUDE_CODE != 'true' && env.HAS_CODEX_AUTH == 'true'
        id: pullfrog_codex
        continue-on-error: true
        uses: pullfrog/pullfrog@a809795406487e13f894c681ea09b4f96015284d # v0
        with:
          model: openai/gpt
          push: disabled
          shell: disabled
          status_checks: enabled
          prompt: |
            Review this pull request as an additional reviewer alongside CodeRabbit.
            Focus on correctness, security, regressions, missing tests, and maintainability.
            Leave concise, actionable comments only for issues that should be addressed before merge.
        env:
          CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}

      - name: Skip PullFrog when subscription auth is not configured
        if: env.HAS_CLAUDE_CODE != 'true' && env.HAS_CODEX_AUTH != 'true'
        run: |
          echo "::notice title=PullFrog skipped::Configure CLAUDE_CODE_OAUTH_TOKEN or CODEX_AUTH_JSON to enable PullFrog reviews."

      - name: PullFrog review incomplete (non-fatal)
        if: always() && ((env.HAS_CLAUDE_CODE == 'true' && steps.pullfrog_claude.outcome != 'success') || (env.HAS_CLAUDE_CODE != 'true' && env.HAS_CODEX_AUTH == 'true' && steps.pullfrog_codex.outcome != 'success'))
        run: |
          echo "::notice title=PullFrog skipped::Review did not complete (e.g. Claude session limit). Thread enforcement skipped."

      - name: Fail when PullFrog requested changes
        if: |
          (env.HAS_CLAUDE_CODE == 'true' && steps.pullfrog_claude.outcome == 'success') ||
          (env.HAS_CLAUDE_CODE != 'true' && env.HAS_CODEX_AUTH == 'true' && steps.pullfrog_codex.outcome == 'success')
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail
          if [ -z "${PR_NUMBER:-}" ]; then
            echo "::notice title=PullFrog thread enforcement skipped::No PR number available (e.g. workflow_dispatch event)."
            exit 0
          fi
          query='query($owner: String!, $repo: String!, $number: Int!) {
            repository(owner: $owner, name: $repo) {
              pullRequest(number: $number) {
                reviewThreads(first: 100) {
                  nodes {
                    isResolved
                    comments(first: 1) { nodes { author { login } } }
                  }
                }
              }
            }
          }'
          for attempt in $(seq 1 30); do
            open="$(gh api graphql -f query="$query" \
              -f owner="$REPO_OWNER" -f repo="$REPO_NAME" -F number="$PR_NUMBER" \
              --jq '[.data.repository.pullRequest.reviewThreads.nodes[]?
                | select(.isResolved == false and ((.comments.nodes[0].author.login // "") | startswith("pullfrog")))] | length' \
              2>/dev/null || echo "")"
            if [ -n "$open" ] && [ "$open" != "0" ]; then
              echo "::error title=PullFrog requested changes::${open} unresolved PullFrog review thread(s) remain."
              exit 1
            fi
            if [ "$open" = "0" ]; then
              echo "PullFrog approval: no unresolved review threads"
              exit 0
            fi
            echo "Waiting for PullFrog review threads (attempt ${attempt}/30)..."
            sleep 10
          done
          echo "::error title=PullFrog review incomplete::Could not read PullFrog review threads for PR #${PR_NUMBER}."
          exit 1
