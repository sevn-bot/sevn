# pullfrog-py PR review (BYOK; https://github.com/alexhawat/pullfrog-py).
#
# Replaces the upstream pullfrog/pullfrog action AND CodeRabbit. Auto-reviews PRs
# on open / ready / new commits, posting inline comments + a summary as
# github-actions[bot], plus opt-in `pullfrog` / `pullfrog-approval` check-runs.
# The enforce step below fails the job when `pullfrog-approval` is "would not
# approve" (outstanding review feedback). If the review cannot run (fork PR with
# no secrets, Claude session limit, no approval posted), the job passes.
#
# pullfrog-py reads the native GITHUB_EVENT_PATH, so the workflow just passes a
# prompt — no ~pullfrog JSON payload needed.
#
# Auth: only CLAUDE_CODE_OAUTH_TOKEN is required (Claude subscription); the job
# skips gracefully when it is absent (e.g. fork PRs).
#
# To make this a hard merge gate, add the "pullfrog-py review" job (or the
# `pullfrog-approval` check) to branch protection required checks.
name: pullfrog-py

on:
  pull_request:
    # `pre-*` glob keeps every release-staging branch (pre-0.0.1, pre-0.0.2, …)
    # auto-reviewed without editing this list each cut (matches the old
    # .coderabbit.yaml `pre-.*` coverage).
    branches: [main, develop, test-pre, "pre-*"]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      prompt:
        description: Prompt for the agent (workflow_dispatch only)
        required: false
        type: string

permissions:
  contents: read
  # Post inline PR review + comments.
  pull-requests: write
  issues: write
  # Post pullfrog / pullfrog-approval check-runs.
  checks: write
  statuses: write
  # pullfrog-py can mint short-lived tokens via OIDC when configured.
  id-token: write

concurrency:
  group: pullfrog-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  review:
    name: pullfrog-py review
    # Skip drafts (reviewed once marked ready); always allow manual dispatch.
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      HAS_CLAUDE_CODE: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN != '' }}

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Skip when Claude subscription auth is not configured
        if: env.HAS_CLAUDE_CODE != 'true'
        run: |
          echo "::notice title=pullfrog-py skipped::Configure CLAUDE_CODE_OAUTH_TOKEN to enable pullfrog-py reviews (fork PRs run without secrets)."

      - name: pullfrog-py PR review (Claude subscription)
        if: env.HAS_CLAUDE_CODE == 'true'
        id: pullfrog
        continue-on-error: true
        # pullfrog-py, SHA-pinned to alexhawat/pullfrog-py main.
        uses: alexhawat/pullfrog-py@dc98633049a6f473124e013ffd1e446d7e10b70a # main
        with:
          # For pull_request events, name the PR number explicitly so the agent
          # calls checkout_pr(<n>) instead of asking which PR to review.
          prompt: >-
            ${{ (github.event_name == 'pull_request' && format('Review pull request #{0}. Focus on correctness, security, regressions, missing tests, and maintainability. Leave concise, actionable comments only for issues that should be addressed before merge.', github.event.pull_request.number))
                || (github.event_name == 'workflow_dispatch' && inputs.prompt != '' && inputs.prompt)
                || 'Review the current pull request.' }}
          model: anthropic/claude-sonnet
          push: disabled
          shell: disabled
          status_checks: enabled
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

      - name: pullfrog-py review incomplete (non-fatal)
        if: env.HAS_CLAUDE_CODE == 'true' && steps.pullfrog.outcome != 'success'
        run: |
          echo "::notice title=pullfrog-py incomplete::Review step did not finish successfully (see its log — e.g. Claude session limit or a runtime error). Approval enforcement skipped."

      - name: Fail when pullfrog-py would not approve
        # Gate directly on the `pullfrog-approval` check-run, decoupled from the
        # review step's own exit code (which can be non-zero on a benign output
        # hiccup even when the review + approval check posted fine). Runs on every
        # PR where auth is present.
        if: >-
          github.event_name == 'pull_request' &&
          env.HAS_CLAUDE_CODE == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          # The action posts a `pullfrog-approval` check-run on the PR head SHA:
          # conclusion=success => no outstanding feedback; failure => changes wanted.
          # Retry so a transient API error is not mistaken for "no review ran"
          # (which would silently mask a genuine "would not approve").
          conclusion=""; queried=""
          for attempt in $(seq 1 5); do
            if conclusion="$(gh api "/repos/${REPO}/commits/${HEAD_SHA}/check-runs" \
                --jq '[.check_runs[]? | select(.name == "pullfrog-approval")]
                      | sort_by(.completed_at // .started_at) | last | .conclusion // ""')"; then
              queried="yes"; break
            fi
            echo "check-runs query failed (attempt ${attempt}/5); retrying in 5s…" >&2
            sleep 5
          done
          if [ -z "${queried}" ]; then
            # DELIBERATE fail-open: if the check-runs API is unreachable even after
            # retries, that's a GitHub-infra failure, not a review verdict. Blocking
            # here (exit 1) would turn a GitHub API outage into a repo-wide merge
            # freeze on every gated branch. We accept the small risk that a rare,
            # sustained API outage lets one PR through unverified rather than halting
            # all merges. (A genuine "would not approve" is handled below via the
            # posted check-run, which does block.)
            echo "::warning title=pullfrog-py approval unknown::Could not query check-runs for ${HEAD_SHA} after retries. Failing open (GitHub API issue) — approval state unverified."
            exit 0
          fi
          case "${conclusion}" in
            failure)
              echo "::error title=pullfrog-py requested changes::pullfrog-approval check failed — address the review feedback on this PR."
              exit 1
              ;;
            success)
              echo "pullfrog-py approval: no outstanding review feedback."
              ;;
            *)
              echo "::notice title=pullfrog-py approval not posted::No pullfrog-approval check on ${HEAD_SHA} (review found nothing to gate, or did not complete). Not blocking."
              ;;
          esac
