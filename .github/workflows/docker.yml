# Container CI — image builds + compose / sandbox integration.
#
# Split out of ci.yml so the PR verify gate stays cheap: on pull requests these
# Docker-heavy jobs run only when container-relevant paths change; every push to
# a gated branch still runs them in full, so a src-only PR that slips past the
# path filter is caught at merge time.
#
# Builds share GHA layer-cache scopes (sandbox/proxy/gateway/…) with publish-ghcr
# in ci-cd.yml. The weekly no-cache drift canary lives in ci-supplementary.yml.
name: Docker

on:
  pull_request:
    branches: [main, develop, test-pre]
    paths:
      - "docker/Dockerfile*"
      - ".dockerignore"
      - "docker/docker-compose*.yml"
      - "pyproject.toml"
      - "uv.lock"
      - "src/sevn/gateway/**"
      - "src/sevn/proxy/**"
      - "infra/docker/**"
      - "infra/ci-mock-openai/**"
      - "infra/ci-workspace/**"
      - "infra/sevn.schema.json"
      - "tests/integration/**"
      - "tests/sandbox/**"
      - ".github/workflows/docker.yml"
      - ".github/actions/**"
  push:
    branches: [main, develop, test-pre]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docker-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-images:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build sandbox image (GHA cache)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: docker/Dockerfile.sandbox
          push: false
          load: true
          tags: sevn-sandbox:ci
          cache-from: type=gha,scope=sandbox
          cache-to: type=gha,mode=max,scope=sandbox,ignore-error=true

      - name: Build proxy image (GHA cache)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: docker/Dockerfile.proxy
          push: false
          load: true
          tags: sevn-proxy:ci
          cache-from: type=gha,scope=proxy
          cache-to: type=gha,mode=max,scope=proxy,ignore-error=true

      - name: Build gateway image (GHA cache)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: docker/Dockerfile.gateway
          push: false
          load: true
          tags: sevn-gateway:ci
          cache-from: type=gha,scope=gateway
          cache-to: type=gha,mode=max,scope=gateway,ignore-error=true

      - name: Build gateway browser image (GHA cache)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: docker/Dockerfile.gateway.browser
          push: false
          load: true
          tags: sevn-gateway-browser:ci
          cache-from: type=gha,scope=gateway-browser
          cache-to: type=gha,mode=max,scope=gateway-browser,ignore-error=true

  compose-ci:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: ./.github/actions/bootstrap
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      # Pre-build the two slow images with GHA layer cache and load them into
      # the daemon under the exact tags docker-compose.ci.yml expects. Compose
      # then reuses them (pull_policy:never + up --no-build) instead of doing an
      # uncached rebuild. Shares cache scopes with docker-images / publish-ghcr.
      - name: Build proxy image (GHA cache)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: docker/Dockerfile.proxy
          push: false
          load: true
          tags: sevn-proxy:ci
          cache-from: type=gha,scope=proxy
          cache-to: type=gha,mode=max,scope=proxy,ignore-error=true

      - name: Build gateway image (GHA cache)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: docker/Dockerfile.gateway
          push: false
          load: true
          tags: sevn-gateway:ci
          cache-from: type=gha,scope=gateway
          cache-to: type=gha,mode=max,scope=gateway,ignore-error=true

      - name: Compose up — gateway + proxy + mock upstream
        run: |
          # Fail fast if the pre-build did not load the expected tags.
          docker image inspect sevn-proxy:ci >/dev/null
          docker image inspect sevn-gateway:ci >/dev/null
          # mock-openai is tiny and not pre-built; let compose build just it.
          docker compose -f docker/docker-compose.ci.yml build mock-openai
          docker compose -f docker/docker-compose.ci.yml up -d --no-build
          # Bounded warmup: poll each health endpoint instead of a fixed sleep,
          # which races container startup on slow runners.
          wait_for() {
            url="$1"; name="$2"; tries=60
            i=1
            while [ "$i" -le "$tries" ]; do
              if curl -fsS "$url" >/dev/null 2>&1; then
                echo "$name ready after ${i}s"
                return 0
              fi
              sleep 1
              i=$((i + 1))
            done
            echo "::error::$name not ready at $url after ${tries}s"
            docker compose -f docker/docker-compose.ci.yml ps
            docker compose -f docker/docker-compose.ci.yml logs --no-color --tail=120
            return 1
          }
          wait_for http://127.0.0.1:18787/healthz proxy
          wait_for http://127.0.0.1:13001/health gateway
          uv run python - <<'PY'
          import json
          import urllib.request

          with urllib.request.urlopen("http://127.0.0.1:13001/ready", timeout=30) as resp:
              body = json.load(resp)
          assert body.get("ready") is True, body
          assert body.get("proxy", {}).get("ok") is True, body
          PY

      - name: Agent→proxy round-trip (integration)
        env:
          SEVN_CI_PROXY_URL: http://127.0.0.1:18787
        run: uv run pytest tests/integration/test_proxy_transport_compose_roundtrip.py -v --tb=short --strict-markers -m integration

      - name: Tear down compose stack
        if: always()
        run: docker compose -f docker/docker-compose.ci.yml down -v

  sandbox-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: ./.github/actions/bootstrap
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Docker-backed sandbox contract tests
        run: make sandbox-integration
