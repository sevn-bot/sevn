# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
# CodeRabbit config. Primary integration is the CodeRabbit GitHub App (free for
# public repos): it auto-reviews every PR with inline comments — no API key, no
# CI minutes. `make review` reuses this same config for local CLI reviews.
# Advisory only (request_changes_workflow: false) — never a merge gate.
# See plan/ci-quality-hardening-wave-plan.md D7.
language: en-US
early_access: false
reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  review_details: false
  auto_review:
    enabled: true
    # Skip draft PRs; review once they're marked ready.
    drafts: false
    base_branches:
      - main
      - develop
      - test-pre
  path_filters:
    - "!**/pyclaww/**"
    - "!**/node_modules/**"
    - "!**/dist/**"
    - "!**/.cache/**"
    - "!**/graphify-out/**"
    - "!**/.index/**"
    - "!**/uv.lock"
    - "!**/*.log"
    - "!**/src/sevn/data/bundled_skills/**"
    - "!**/about-sevn.bot/_site/**"
  path_instructions:
    - path: "src/sevn/**"
      instructions: >-
        Python 3.12+ sevn.bot gateway code. Follow about-sevn.bot/_standards/coding-standards.md.
        Use Makefile targets (make lint, make typecheck) — not raw uv/pytest/ruff/mypy.
    - path: "tests/**"
      instructions: >-
        Pytest tests for sevn.bot. Match existing fixture patterns; prefer Makefile targets.
    - path: "scripts/**"
      instructions: >-
        Repo automation scripts. ADR docstrings with Exports/Examples; keep Makefile as command surface.
