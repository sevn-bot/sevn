title: Welcome to sevn.bot
summary: Your personal AI assistant — one bot on your machine, in the channels you already use.
body: |
  <p>sevn.bot is a personal assistant you run yourself. It remembers context across conversations, works with the model provider you choose, and can use tools and skills to get things done on your behalf.</p>
  <h2>What you can do</h2>
  <ul>
    <li>Chat from <strong>Telegram</strong>, the <strong>web UI</strong>, or the CLI</li>
    <li>Adjust behavior from the Telegram <code>/config</code> menu — see the <a href="telegram-menu.html">settings preview</a></li>
    <li>Manage models, memory, and integrations from <a href="mission-control.html">Mission Control</a> when the dashboard is enabled</li>
    <li>Extend capabilities with bundled <a href="skills.html">skills</a> and built-in <a href="tools.html">tools</a></li>
    <li>Run parallel work via <a href="sub-agents.html">sub-agents</a> when <code>gateway.queue_mode</code> is <code>multi</code></li>
  </ul>
  <h2>New here?</h2>
  <p>Start with <a href="getting-started.html">Getting started</a> — install, run the setup wizard, and send your first message.</p>
