title: Google Workspace
summary: Bundled OAuth2 skill for Gmail, Calendar, Drive, and Contacts, with browser/email fallbacks and planned Sheets/Docs expansion.
body: |
  <p>The <code>google-workspace</code> skill brings bundled Google Workspace API access to sevn.bot,
  modeled on the
  <a href="https://hermes-agent.nousresearch.com/docs/user-guide/skills/google-workspace" rel="noopener">Hermes Agent google-workspace skill</a>.
  It uses OAuth2 with automatic token refresh. The current shipped backend is the Python/OAuth path; the optional
  <a href="https://github.com/googleworkspace/cli" rel="noopener">Google Workspace CLI (<code>gws</code>)</a>
  bridge remains planned.</p>

  <h2>Status</h2>
  <p><code>google-workspace</code> is now a <strong>bundled skill</strong>. The shipped surface covers Phase 1-3 core flows: OAuth setup, Gmail API operations, Calendar list/create/delete, Drive search/get, and Contacts list. <code>email-management</code> remains the quickest email-only path, and browser Gmail remains the no-OAuth fallback. Sheets/Docs and Drive write commands are still marked <code>planned</code> in the catalog below.</p>
  <ul>
    <li><a href="tools.html"><code>browser</code></a> — Gmail read/search (and gated compose/reply), Google Search, Maps, YouTube</li>
    <li><a href="skills.html"><code>email-management</code></a> — multi-account IMAP/SMTP (Gmail app passwords; no Cloud project)</li>
  </ul>
  <p><code>google-workspace</code> is the primary routing target for Calendar, Drive, Sheets, Docs, Contacts, and Gmail API-specific workflows.</p>

  <h2>When to use which path</h2>
  <table class="catalog-table">
    <thead><tr><th>Need</th><th>Best path now</th><th>Notes</th></tr></thead>
    <tbody>
      <tr><td>Email only, quick setup</td><td><code>email-management</code></td><td>Best for IMAP/SMTP, multi-account mail, and non-Google providers</td></tr>
      <tr><td>Gmail API (labels, threading, HTML send/reply)</td><td><code>google-workspace</code></td><td>Use browser Gmail only as a fallback when OAuth is unavailable</td></tr>
      <tr><td>Calendar / Drive / Sheets / Docs intents</td><td><code>google-workspace</code></td><td>Primary routing target; some Sheets/Docs and Drive write commands remain planned</td></tr>
      <tr><td>No OAuth / logged-in browser session</td><td><code>browser</code> gmail</td><td>Good fallback for urgent read/search work without API setup</td></tr>
    </tbody>
  </table>

  <h2>How the agent uses the skill</h2>
  <ol>
    <li>Triager selects <code>google-workspace</code> for Gmail API, Calendar, Drive, Sheets, Docs, and Contacts intents.</li>
    <li>Agent calls <code>load_skill("google-workspace")</code> for setup prose and script capabilities.</li>
    <li>Agent runs operations with <code>run_skill_script</code>, passing argv to <code>scripts/google_api.py</code> or <code>scripts/setup.py</code>.</li>
  </ol>
  <p>Example:</p>
  <pre><code>run_skill_script(
    "google-workspace",
    "scripts/google_api.py",
    ["gmail", "search", "is:unread", "--max", "10"]
  )</code></pre>

  <h2>First-time OAuth setup</h2>
  <ol>
    <li>Operator creates a Google Cloud project and enables Gmail, Calendar, Drive, Sheets, Docs, and People APIs.</li>
    <li>Download Desktop OAuth client JSON; agent runs <code>scripts/setup.py --client-secret PATH</code>.</li>
    <li>Agent returns auth URL; operator approves in browser and pastes redirect URL.</li>
    <li><code>scripts/setup.py --auth-code …</code> stores token under <code>.sevn/google_token.json</code> (auto-refresh).</li>
  </ol>
  <p>Credentials never appear in chat or script JSON output.</p>

  <h2>Safety rules</h2>
  <ul>
    <li>Confirm with the operator before sending email, creating/deleting calendar events, uploading or sharing Drive files, or modifying Sheets/Docs.</li>
    <li>Prefer Drive trash over permanent delete.</li>
    <li>Calendar times must use ISO 8601 with timezone offset or UTC (<code>Z</code>).</li>
  </ul>

